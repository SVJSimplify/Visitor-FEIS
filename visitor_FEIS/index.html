<!DOCTYPE html>
<html>
<head>
  <title>Visitor - An FEIS App</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ===== YOUR CSS IS UNCHANGED ===== */
    body {
      background-color: #f9d423;
      background-image: radial-gradient(#8e0e00 5%, transparent 6%);
      background-size: 30px 30px;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    header {
      background: linear-gradient(to right, #f9d423, #8e0e00);
      color: white;
      padding: 25px;
      text-align: center;
      position: relative;
    }

    .auth-buttons {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .auth-row {
      display: flex;
      gap: 10px;
    }

    .container {
      max-width: 460px;
      margin: 50px auto;
      padding: 30px;
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    }

    .button-group {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      color: #8e0e00;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      background: #f7f7f7;
    }

    button {
      background: #f9d423;
      color: #8e0e00;
      border: 2px solid #8e0e00;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      min-width: 140px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    button:hover {
      background: #ffe066;
    }

    form {
      display: none;
      margin-top: 20px;
    }

    #qrcode {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Visitour - An FEIS App</h1>

  <div class="auth-buttons">
    <div class="auth-row" id="authRowTop">
      <button onclick="showForm('signin')">Sign In</button>
      <button onclick="showForm('signup')">Sign Up</button>
    </div>

    <div class="auth-row">
      <button onclick="showForm('adminSignin')">Admin Sign In</button>
      <button onclick="window.location.href='scan.html'">Security Login</button>
    </div>
  </div>
</header>

<div class="container">

  <div class="button-group">
    <button onclick="showForm('Visitor')">Visitor</button>
    <button onclick="showForm('Parent')">Parent</button>
  </div>

  <form id="detailsForm">
    <input type="hidden" id="role">

    <label>Name</label>
<input id="name" required
       oninput="allowLetters(this)">

<label>Phone</label>
<input id="phone" required
       maxlength="10"
       oninput="allowNumbers(this)">

<label>Purpose</label>
<input id="purpose" required
       oninput="allowLetters(this)">

<label>Whom To Meet</label>
<input id="meet" required
       oninput="allowLetters(this)">
       <label>Notes</label>
<textarea id="notes"></textarea>



    <button type="submit">Generate QR Code</button>
  </form>

  <form id="signinForm">
    <label>Email</label>
    <input id="signinEmail" type="email" required>

    <label>Password</label>
    <input id="signinPassword" type="password" required>

    <button type="submit">Sign In</button>
  </form>

  <form id="signupForm">
    <label>Name</label>
    <input id="signupName" required>

    <label>Phone</label>
    <input id="signupPhone" required>

    <label>Email</label>
    <input id="signupEmail" type="email" required>

    <label>Password</label>
    <input id="signupPassword" type="password" required>

    <button type="submit">Sign Up</button>
  </form>

  <form id="adminSigninForm" onsubmit="return adminLogin(event)">
    <label>Email</label>
    <input id="adminEmail" type="email" required>

    <label>Password</label>
    <input id="adminPassword" type="password" required>

    <button type="submit">Admin Sign In</button>
  </form>

  <div id="qrcode"></div>

</div>

<script>

const db = supabase.createClient(
  "https://eepbysmfhxbjaobteios.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlcGJ5c21maHhiamFvYnRlaW9zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDA3OTcsImV4cCI6MjA4NjY3Njc5N30.mnCzfDZsHdsBjfkkbFoz3SmO48_BYrAcdjw5HRR6Qv0",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

/* ---------- FORM TOGGLING ---------- */
function showForm(type){
  document.querySelectorAll("form").forEach(f => f.style.display="none");

  if(type==="Visitor"||type==="Parent"){
    document.getElementById("role").value=type;
    document.getElementById("detailsForm").style.display="block";
  }
  if(type==="signin") document.getElementById("signinForm").style.display="block";
  if(type==="signup") document.getElementById("signupForm").style.display="block";
  if(type==="adminSignin") document.getElementById("adminSigninForm").style.display="block";
}

/* ---------- SIGN UP ---------- */
document.getElementById("signupForm").addEventListener("submit", async e=>{
  e.preventDefault();

  const name = signupName.value.trim();
  const phone = signupPhone.value.trim();
  const email = signupEmail.value.trim();
  const password = signupPassword.value.trim();

  const { error } = await db.auth.signUp({
    email,
    password,
    options:{
      data:{
        role:"parent",
        name,
        phone
      }
    }
  });

  if(error){ alert(error.message); return; }
  alert("Sign Up Successful!");
});

/* ---------- SIGN IN ---------- */
document.getElementById("signinForm").addEventListener("submit", async e=>{
  e.preventDefault();

  const { error } = await db.auth.signInWithPassword({
    email: signinEmail.value.trim(),
    password: signinPassword.value.trim()
  });

  if(error){ alert(error.message); return; }
});

/* ---------- SESSION LISTENER (AUTOFILL + LOGOUT) ---------- */
db.auth.onAuthStateChange((event, session)=>{
  if(session){
    const user=session.user;

    if(user.user_metadata?.name)
      document.getElementById("name").value=user.user_metadata.name;

    if(user.user_metadata?.phone)
      document.getElementById("phone").value=user.user_metadata.phone;

    document.getElementById("authRowTop").innerHTML=
      `<button onclick="logout()">Logout</button>`;
  }
});

/* ---------- LOGOUT ---------- */
async function logout(){
  await db.auth.signOut();
  window.location.reload();
}

/* ---------- ADMIN ---------- */
async function adminLogin(e){
  e.preventDefault();

  const { data,error }=await db.auth.signInWithPassword({
    email:adminEmail.value.trim(),
    password:adminPassword.value.trim()
  });

  if(error){ alert(error.message); return false; }

  if(data.user.user_metadata?.role!=="admin"){
    alert("Not authorized as admin");
    await db.auth.signOut();
    return false;
  }

  window.location.href="admin.html";
  return false;
}

/* ---------- QR ---------- */
document.getElementById("detailsForm")
.addEventListener("submit", async (e) => {

  e.preventDefault();

  const roleInput = document.getElementById("role");
  const nameInput = document.getElementById("name");
  const phoneInput = document.getElementById("phone");
  const purposeInput = document.getElementById("purpose");
  const meetInput = document.getElementById("meet");
  const notesInput = document.getElementById("notes");

  if (!roleInput || !nameInput || !phoneInput || !purposeInput || !meetInput || !notesInput) {
    alert("One or more form fields are missing. Check IDs.");
    return;
  }

  const token = crypto.randomUUID();
  const today = new Date().toISOString().split("T")[0];

  const { error } = await db.from("visitors").insert([{
    role: roleInput.value,
    name: nameInput.value,
    phone: phoneInput.value,
    purpose: purposeInput.value,
    meet: meetInput.value,
    notes: notesInput.value,
    visit_date: today,
    qr_token: token,
    scan_count: 0
  }]);

  if (error) {
    alert(error.message);
    return;
  }

  document.getElementById("qrcode").innerHTML = "";
  new QRCode(document.getElementById("qrcode"), {
    text: token,
    width: 200,
    height: 200
  });

});

/* ---------- INPUT RESTRICTIONS ---------- */

// Letters and spaces only
function allowLetters(input) {
  input.value = input.value.replace(/[^A-Za-z ]/g, "");
}

// Numbers only (max 10)
function allowNumbers(input) {
  input.value = input.value.replace(/[^0-9]/g, "");
  if (input.value.length > 10) {
    input.value = input.value.slice(0, 10);
  }
}

</script>

</body>
</html>
