<!DOCTYPE html>
<html>
<head>
  <title>Security Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial;
      background: #f9d423;
      text-align: center;
      padding-top: 100px;
    }

    .box {
      background: white;
      display: inline-block;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    input {
      padding: 10px;
      width: 220px;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      font-weight: bold;
      background: #f9d423;
      border: 2px solid #8e0e00;
      color: #8e0e00;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Security Login</h2>

  <input type="email" id="email" placeholder="Email" required><br>
  <input type="password" id="password" placeholder="Password" required><br>
  <button onclick="login()">Login</button>
</div>

<script>
const db = supabase.createClient(
  "https://eepbysmfhxbjaobteios.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlcGJ5c21maHhiamFvYnRlaW9zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDA3OTcsImV4cCI6MjA4NjY3Njc5N30.mnCzfDZsHdsBjfkkbFoz3SmO48_BYrAcdjw5HRR6Qv0",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

// Prevent already logged-in security from seeing login again
(async () => {
  const { data: { session } } = await db.auth.getSession();
  if(session && session.user.user_metadata?.role === "security") {
    window.location.href = "scan.html";
  }
})();

async function login() {

  const { data, error } = await db.auth.signInWithPassword({
    email: email.value.trim(),
    password: password.value.trim()
  });

  if (error) {
    alert(error.message);
    return;
  }

  if (data.user.user_metadata?.role !== "security") {
    alert("Not authorized as security");
    await db.auth.signOut();
    return;
  }

  // 🔥 CRITICAL: Wait for session to be fully saved
  const { data: sessionData } = await db.auth.getSession();

  if (!sessionData.session) {
    alert("Session failed to persist. Try again.");
    return;
  }

  window.location.href = "scan.html";
}

</script>

</body>
</html>
