<!DOCTYPE html>
<html>
<head>
  <title>Security Scanner</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      background: #f9d423;
      padding: 20px;
      text-align: center;
    }

    h2 {
      color: #8e0e00;
    }

    button {
      padding: 8px 15px;
      font-weight: bold;
      background: #f9d423;
      border: 2px solid #8e0e00;
      color: #8e0e00;
      cursor: pointer;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    #reader {
      width: 300px;
      margin: auto;
    }
  </style>
</head>

<body>

<h2>Security Scanner</h2>
<button onclick="logout()">Logout</button>
<div id="reader"></div>

<script>
const db = supabase.createClient(
  "https://eepbysmfhxbjaobteios.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlcGJ5c21maHhiamFvYnRlaW9zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDA3OTcsImV4cCI6MjA4NjY3Njc5N30.mnCzfDZsHdsBjfkkbFoz3SmO48_BYrAcdjw5HRR6Qv0",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

/* ---------- AUTH PROTECTION ---------- */
(async () => {
  const { data, error } = await db.auth.getSession();

  if (error) {
    console.log(error);
    return;
  }

  if (!data.session) {
    window.location.href = "security.html";
    return;
  }

  if (data.session.user.user_metadata?.role !== "security") {
    window.location.href = "security.html";
  }
})();

/* ---------- QR SCANNER ---------- */

function onScanSuccess(decodedText) {
  handleScan(decodedText);
}

const scanner = new Html5QrcodeScanner(
  "reader",
  { fps: 10, qrbox: 250 }
);

scanner.render(onScanSuccess);

/* ---------- SCAN LOGIC ---------- */

async function handleScan(token) {

  const today = new Date().toISOString().split("T")[0];

  const { data, error } = await db
    .from("visitors")
    .select("*")
    .eq("qr_token", token)
    .single();

  if (error || !data) {
    alert("Invalid QR Code");
    return;
  }

  if (data.visit_date !== today) {
    alert("QR Expired");
    return;
  }

  if (data.scan_count >= 2) {
    alert("Already Used Twice");
    return;
  }

  let update = {
    scan_count: data.scan_count + 1,
    status: data.scan_count === 0 ? "INSIDE" : "LEFT"
  };

  if (data.scan_count === 0)
    update.check_in_time = new Date().toISOString();
  else
    update.check_out_time = new Date().toISOString();

  await db
    .from("visitors")
    .update(update)
    .eq("id", data.id);

  alert("Access Granted");
}

/* ---------- LOGOUT ---------- */

async function logout() {
  await db.auth.signOut();
  window.location.href = "security.html";
}
</script>

</body>
</html>
