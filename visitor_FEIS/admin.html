<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#f9d423;font-family:Arial;padding:20px;}
table{background:white;border-collapse:collapse;width:100%;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
</style>
</head>

<body>

<h2>Admin Dashboard</h2>
<h3 id="insideCount"></h3>
<div id="visitorData"></div>

<script>
const db = supabase.createClient(
  "https://eepbysmfhxbjaobteios.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlcGJ5c21maHhiamFvYnRlaW9zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDA3OTcsImV4cCI6MjA4NjY3Njc5N30.mnCzfDZsHdsBjfkkbFoz3SmO48_BYrAcdjw5HRR6Qv0",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

async function checkAdmin(){
  const { data:{session} } = await db.auth.getSession();
  if(!session || session.user.user_metadata?.role!=="admin"){
    window.location.href="index.html";
  }
}
checkAdmin();

async function loadData(){
  const today=new Date().toISOString().split("T")[0];

  const { data } = await db
    .from("visitors")
    .select("*")
    .eq("visit_date",today)
    .order("id",{ascending:false});

  let inside=0;

  let html=`<table>
  <tr>
  <th>Name</th>
  <th>Phone</th>
  <th>Purpose</th>
  <th>Meet</th>
  <th>Check In</th>
  <th>Check Out</th>
  <th>Status</th>
  </tr>`;

  data.forEach(v=>{
    if(v.status==="INSIDE") inside++;

    html+=`<tr>
    <td>${v.name}</td>
    <td>${v.phone}</td>
    <td>${v.purpose||"-"}</td>
    <td>${v.meet||"-"}</td>
    <td>${v.check_in_time?new Date(v.check_in_time).toLocaleTimeString():"-"}</td>
    <td>${v.check_out_time?new Date(v.check_out_time).toLocaleTimeString():"-"}</td>
    <td>${
      v.status==="INSIDE"
      ? "<span style='color:green;font-weight:bold'>INSIDE</span>"
      : v.status==="LEFT"
      ? "<span style='color:red;font-weight:bold'>LEFT</span>"
      : "Pending"
    }</td>
    </tr>`;
  });

  html+="</table>";

  visitorData.innerHTML=html;
  insideCount.innerText="Currently Inside: "+inside;
}

loadData();
setInterval(loadData,10000);
</script>

</body>
</html>
